<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"/>
  <meta name="theme-color" content="#1d4ed8"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="GymLog"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <title>GymLog — Fitness Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#f1f5f9;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    #root{min-height:100%}
    .splash{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;background:linear-gradient(135deg,#0f172a,#1e1b4b,#1d4ed8)}
    .splash-ring{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:#e5e7eb;width:100%}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#3b82f6;box-shadow:0 1px 6px rgba(0,0,0,.2);cursor:pointer}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
    @keyframes slideIn{from{opacity:0;transform:translateX(var(--slide-from,20px))}to{opacity:1;transform:translateX(0)}}
    .tab-content{animation:slideIn .26s cubic-bezier(.25,.46,.45,.94) both}
  </style>
</head>
<body>
  <div id="root">
    <div class="splash">
      <div style="font-size:56px;margin-bottom:8px">🏋️</div>
      <div style="color:#fff;font-size:28px;font-weight:900;letter-spacing:-.5px">GymLog</div>
      <div style="color:rgba(255,255,255,.5);font-size:13px;margin-bottom:8px">Fitness Tracker</div>
      <div class="splash-ring"></div>
    </div>
  </div>

  <!-- React 18 from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>

  <script type="text/babel" src="app.js" data-presets="react"></script>
</body>
</html>
